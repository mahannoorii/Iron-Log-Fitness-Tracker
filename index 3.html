<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Iron Log">
<meta name="theme-color" content="#0a0a08">
<title>Iron Log</title>
<style>
  /* System fonts - no external dependencies */
  :root {
    --bg:#0a0a08; --bg-card:#14140f; --bg-card-2:#1a1a14; --bg-elevated:#1f1f18;
    --border:#2a2a20; --border-strong:#3a3a2c;
    --text:#f5f1e0; --text-2:#a8a497; --text-3:#6a6660; --text-4:#3a3a32;
    --green:#5fb37a; --green-strong:#7dd49a; --green-bg:#0e2418; --green-border:#1f4a30;
    --gold:#ffc647; --gold-strong:#ffd76e; --gold-bg:#2a1f00; --gold-border:#4a3a08;
    --red:#d46060;
    --push:#4a8a5e; --pull:#3a7aa0; --shoulders:#c87a3c; --legs:#b88a3c;
    --q1:#4a8a5e; --q2:#3a7aa0; --q3:#c87a3c; --q4:#a05a8a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;}
  html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:15px;min-height:100vh;overscroll-behavior:none;}
  #app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:100px;position:relative;}

  /* Header */
  .header{background:linear-gradient(180deg,#161611 0%,#0a0a08 100%);border-bottom:1px solid var(--border);padding:18px 18px 16px;position:sticky;top:0;z-index:100;}
  .header-top{display:flex;justify-content:space-between;align-items:center;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#2a4a32 0%,#1a3a22 100%);border:1px solid #3a5a42;display:flex;align-items:center;justify-content:center;font-family:'Impact','Arial Narrow',sans-serif;font-size:22px;color:var(--green-strong);letter-spacing:1px;}
  .brand-text .app-title{font-family:'Impact','Arial Narrow',sans-serif;font-size:28px;letter-spacing:4px;color:var(--text);line-height:1;}
  .brand-text .app-sub{font-size:10px;color:var(--green);letter-spacing:2.5px;text-transform:uppercase;margin-top:4px;font-weight:600;}
  .csv-btn{background:var(--bg-elevated);border:1px solid var(--border-strong);color:var(--text-2);padding:10px 14px;border-radius:10px;font-size:12px;font-family:inherit;font-weight:600;cursor:pointer;letter-spacing:1px;display:flex;align-items:center;gap:6px;transition:all 0.2s;}
  .csv-btn:active{transform:scale(0.96);background:var(--border);}
  .csv-btn svg{width:14px;height:14px;}
  .nav-row{display:flex;gap:4px;padding:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;margin-top:14px;}
  .nav-btn{flex:1;padding:11px 0;border-radius:8px;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:1.5px;cursor:pointer;border:none;background:transparent;color:var(--text-3);transition:all 0.2s;}
  .nav-btn.active{background:var(--green);color:#0a1a0e;box-shadow:0 2px 8px rgba(95,179,122,0.25);}

  /* Quarter selector */
  .quarter-bar{padding:14px 18px 12px;border-bottom:1px solid var(--border);}
  .quarter-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
  .qbtn{padding:14px 0;border-radius:12px;font-family:'Impact','Arial Narrow',sans-serif;font-size:18px;letter-spacing:2px;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text-3);transition:all 0.15s;text-align:center;}
  .qbtn:active{transform:scale(0.96);}
  .qbtn .q-dates{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:9px;letter-spacing:1px;color:var(--text-4);margin-top:3px;font-weight:500;display:block;}
  .qbtn.active{color:#fff;}
  .qbtn.active .q-dates{color:rgba(255,255,255,0.7);}
  .qbtn.q1.active{background:var(--q1);border-color:var(--q1);box-shadow:0 4px 14px rgba(74,138,94,0.35);}
  .qbtn.q2.active{background:var(--q2);border-color:var(--q2);box-shadow:0 4px 14px rgba(58,122,160,0.35);}
  .qbtn.q3.active{background:var(--q3);border-color:var(--q3);box-shadow:0 4px 14px rgba(200,122,60,0.35);}
  .qbtn.q4.active{background:var(--q4);border-color:var(--q4);box-shadow:0 4px 14px rgba(160,90,138,0.35);}

  /* Week selector */
  .week-bar{padding:18px 18px 14px;border-bottom:1px solid var(--border);}
  .section-label{font-size:11px;letter-spacing:3px;color:var(--text-3);text-transform:uppercase;margin-bottom:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
  .week-info{font-size:10px;color:var(--text-4);font-weight:500;letter-spacing:1px;font-family:'Courier New',monospace;}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .week-btn{aspect-ratio:1;min-height:42px;border-radius:10px;font-family:'Impact','Arial Narrow',sans-serif;font-size:18px;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text-3);transition:all 0.15s;letter-spacing:1px;display:flex;align-items:center;justify-content:center;position:relative;}
  .week-btn:active{transform:scale(0.94);}
  .week-btn.has-data{background:var(--bg-elevated);color:var(--text-2);border-color:var(--border-strong);}
  .week-btn.has-data::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--green);}
  .week-btn.archived{opacity:0.55;}
  .week-btn.active{color:#fff;}
  .week-btn.active.q1{background:var(--q1);border-color:var(--q1);box-shadow:0 4px 14px rgba(74,138,94,0.35);}
  .week-btn.active.q2{background:var(--q2);border-color:var(--q2);box-shadow:0 4px 14px rgba(58,122,160,0.35);}
  .week-btn.active.q3{background:var(--q3);border-color:var(--q3);box-shadow:0 4px 14px rgba(200,122,60,0.35);}
  .week-btn.active.q4{background:var(--q4);border-color:var(--q4);box-shadow:0 4px 14px rgba(160,90,138,0.35);}
  .week-btn.active::after{background:#fff !important;opacity:0.7;}

  /* Day pills */
  .day-tabs{display:flex;gap:8px;padding:14px 18px;overflow-x:auto;border-bottom:1px solid var(--border);}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{flex-shrink:0;padding:12px 18px;border-radius:12px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px;cursor:pointer;border:1px solid var(--border);background:var(--bg-card);color:var(--text-3);white-space:nowrap;transition:all 0.2s;min-height:48px;display:flex;align-items:center;gap:8px;}
  .day-tab:active{transform:scale(0.96);}
  .day-tab .day-num{font-family:'Impact','Arial Narrow',sans-serif;font-size:18px;letter-spacing:2px;opacity:0.7;}
  .day-tab.active{color:#fff;box-shadow:0 4px 14px rgba(0,0,0,0.4);}
  .day-tab.active .day-num{opacity:1;}

  /* Phase / week info banner */
  .phase-banner{margin:18px 18px 0;padding:14px 16px;border-radius:14px;background:var(--bg-card);display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);position:relative;overflow:hidden;}
  .phase-tag{font-family:'Impact','Arial Narrow',sans-serif;font-size:16px;letter-spacing:2.5px;line-height:1;}
  .phase-week{font-size:11px;color:var(--text-3);margin-top:4px;font-family:'Courier New',monospace;letter-spacing:0.5px;}
  .phase-tip{font-size:11px;color:var(--text-3);text-align:right;max-width:160px;line-height:1.45;}

  /* Prev week ref */
  .prev-ref{margin:14px 18px 0;background:var(--bg-card);border-radius:14px;overflow:hidden;border:1px solid var(--border);}
  .prev-title{padding:12px 16px 10px;font-size:11px;letter-spacing:2.5px;color:var(--text-3);text-transform:uppercase;font-weight:700;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
  .prev-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid #161610;}
  .prev-row:last-child{border-bottom:none;}
  .prev-name{font-size:13px;color:var(--text-2);flex:1;font-weight:500;}
  .prev-best{font-size:13px;color:var(--text-2);font-weight:700;font-family:'Courier New',monospace;letter-spacing:0.5px;}
  .prev-empty{padding:14px 16px;text-align:center;font-size:12px;color:var(--text-4);font-style:italic;}

  /* Cards */
  .cards{padding:18px;display:flex;flex-direction:column;gap:14px;}
  .card{border-radius:18px;overflow:hidden;border:1px solid var(--border);background:var(--bg-card);position:relative;}
  .card.traps{background:linear-gradient(180deg,#112418 0%,#14140f 60%);border-color:#2a4a30;}
  .card.abs{background:linear-gradient(180deg,#1d1226 0%,#14140f 60%);border-color:#3a2848;}
  .card-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);}
  .ex-name{font-family:'Impact','Arial Narrow',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text);line-height:1.1;}
  .ex-meta{display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .ex-target{font-size:11px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:6px;font-family:'Courier New',monospace;}
  .ex-notes{font-size:12px;color:var(--text-3);font-style:italic;flex:1;}
  .badge-tag{font-size:9px;padding:2px 7px;border-radius:5px;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;}
  .badge-traps{background:#1f3a26;color:var(--green-strong);}
  .badge-abs{background:#2a1a3a;color:#c8a8e8;}

  /* Sets */
  .sets-grid{display:grid;grid-template-columns:repeat(4,1fr);background:var(--border);gap:1px;}
  .set-col{padding:14px 8px 12px;background:var(--bg-card);position:relative;}
  .card.traps .set-col{background:#131e16;}
  .card.abs .set-col{background:#1a1024;}
  .set-col.disabled{background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;color:var(--text-4);font-size:18px;min-height:100px;}
  .set-col.failure-set{background:linear-gradient(180deg,var(--bg-card) 0%,rgba(212,96,96,0.05) 100%);}
  .card.traps .set-col.failure-set{background:linear-gradient(180deg,#131e16 0%,rgba(212,96,96,0.06) 100%);}
  .card.abs .set-col.failure-set{background:linear-gradient(180deg,#1a1024 0%,rgba(212,96,96,0.06) 100%);}
  .set-label{font-size:11px;color:var(--text-3);text-align:center;margin-bottom:8px;letter-spacing:1.5px;font-weight:700;font-family:'Impact','Arial Narrow',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;}
  .set-label.failure{color:var(--red);}
  .set-input{width:100%;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);font-size:15px;font-weight:600;padding:12px 4px;outline:none;text-align:center;font-family:'Courier New',monospace;border-radius:10px;transition:all 0.15s;min-height:46px;}
  .set-input::placeholder{color:var(--text-4);font-size:11px;font-weight:400;}
  .set-input:focus{border-color:var(--green);background:#1a2418;box-shadow:0 0 0 3px rgba(95,179,122,0.15);}
  .set-input.has-value{background:var(--bg-elevated);border-color:var(--border-strong);}
  .set-input.pr-wt{color:var(--gold-strong);border-color:var(--gold);background:var(--gold-bg);font-weight:700;box-shadow:0 0 0 1px var(--gold);}
  .set-input.pr-rep{color:var(--green-strong);border-color:var(--green);background:var(--green-bg);font-weight:700;box-shadow:0 0 0 1px var(--green);}
  .pr-label{font-size:9px;text-align:center;margin-top:6px;font-weight:800;letter-spacing:1px;font-family:'Impact','Arial Narrow',sans-serif;padding:2px 4px;border-radius:4px;}
  .pr-label.wt{color:var(--gold-strong);background:rgba(255,198,71,0.1);}
  .pr-label.rep{color:var(--green-strong);background:rgba(95,179,122,0.1);}

  /* Toast */
  .toast{position:fixed;top:max(20px,env(safe-area-inset-top,20px));left:50%;transform:translateX(-50%) translateY(-100px);background:linear-gradient(135deg,var(--gold-strong) 0%,var(--gold) 100%);color:#1a1200;padding:14px 26px;border-radius:50px;font-family:'Impact','Arial Narrow',sans-serif;font-size:17px;font-weight:700;letter-spacing:2.5px;z-index:9999;white-space:nowrap;box-shadow:0 8px 32px rgba(255,198,71,0.5),0 2px 8px rgba(0,0,0,0.3);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;gap:10px;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.rep{background:linear-gradient(135deg,var(--green-strong) 0%,var(--green) 100%);color:#062012;box-shadow:0 8px 32px rgba(95,179,122,0.5),0 2px 8px rgba(0,0,0,0.3);}
  .toast-icon{font-size:22px;}

  .log-tip{padding:16px 18px;font-size:11px;color:var(--text-3);text-align:center;line-height:1.7;}
  .log-tip strong{color:var(--text-2);font-weight:600;}

  /* Tracker */
  .tracker-header{padding:20px 18px 12px;border-bottom:1px solid var(--border);}
  .tracker-title{font-family:'Impact','Arial Narrow',sans-serif;font-size:32px;letter-spacing:3px;line-height:1;}
  .tracker-sub{font-size:12px;color:var(--text-3);margin-top:6px;}
  .tracker-controls{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .tracker-filter{padding:8px 14px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-3);font-size:11px;font-weight:600;letter-spacing:1px;cursor:pointer;font-family:inherit;}
  .tracker-filter.active{background:var(--green);color:#0a1a0e;border-color:var(--green);}

  .summary-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px 18px 10px;}
  .summary-card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:18px 8px;text-align:center;position:relative;overflow:hidden;}
  .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
  .summary-card.tracked::before{background:var(--text-2);}
  .summary-card.improved::before{background:var(--green);}
  .summary-card.prs::before{background:var(--gold);}
  .summary-num{font-family:'Impact','Arial Narrow',sans-serif;font-size:32px;line-height:1;letter-spacing:1px;}
  .summary-lbl{font-size:10px;color:var(--text-3);letter-spacing:2.5px;text-transform:uppercase;margin-top:8px;font-weight:700;}

  .tracker-cards{padding:8px 18px 20px;}
  .day-section-label{font-family:'Impact','Arial Narrow',sans-serif;font-size:16px;letter-spacing:3px;text-transform:uppercase;padding:16px 0 8px;display:flex;align-items:center;gap:10px;}
  .day-section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  .t-card{background:var(--bg-card);border-radius:16px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden;border-top-width:3px;}
  .t-card-hdr{padding:14px 16px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;border-bottom:1px solid var(--border);}
  .t-ex-name{font-family:'Impact','Arial Narrow',sans-serif;font-size:18px;letter-spacing:1px;flex:1;line-height:1.15;}
  .t-badges{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
  .t-badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:10px;font-family:'Courier New',monospace;letter-spacing:0.5px;}
  .t-badge.wt{background:var(--gold-bg);color:var(--gold-strong);border:1px solid var(--gold-border);}
  .t-badge.rep{background:var(--green-bg);color:var(--green-strong);border:1px solid var(--green-border);}

  .t-weeks{display:flex;overflow-x:auto;padding:12px 16px 14px;gap:6px;}
  .t-weeks::-webkit-scrollbar{display:none;}
  .t-week{flex-shrink:0;width:60px;min-height:64px;border-radius:10px;padding:8px 4px;text-align:center;border:1px solid var(--border);background:var(--bg-elevated);display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .t-week.empty{background:rgba(0,0,0,0.3);border-color:#161610;}
  .t-week.pr-wt{background:var(--gold-bg);border-color:var(--gold);box-shadow:0 0 12px rgba(255,198,71,0.2);}
  .t-week.pr-rep{background:var(--green-bg);border-color:var(--green);box-shadow:0 0 12px rgba(95,179,122,0.2);}
  .t-wk-lbl{font-size:9px;color:var(--text-3);letter-spacing:1.5px;margin-bottom:4px;font-family:'Impact','Arial Narrow',sans-serif;}
  .t-wk-wt{font-family:'Courier New',monospace;font-size:14px;font-weight:700;line-height:1;}
  .t-wk-rp{font-size:11px;color:var(--text-3);margin-top:2px;font-family:'Courier New',monospace;}
  .t-wk-star{font-size:9px;margin-top:3px;font-family:'Impact','Arial Narrow',sans-serif;letter-spacing:0.5px;}
  .t-wk-empty{font-size:14px;color:var(--text-4);margin-top:4px;}
  .t-no-data{font-size:12px;color:var(--text-3);padding:14px 16px 16px;font-style:italic;text-align:center;}

  .safe-bottom{height:env(safe-area-inset-bottom,16px);}

  @media (max-width:380px){
    .week-grid{grid-template-columns:repeat(6,1fr);}
    .week-btn{font-size:15px;min-height:38px;}
    .ex-name{font-size:19px;}
    .set-input{font-size:13px;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
// ── Program Data ─────────────────────────────────────────────
const PROGRAM = [
  { id:'push', label:'DAY 1', name:'PUSH', sub:'Chest · Triceps · Traps', color:'#4a8a5e',
    exercises:[
      {id:'incline_press', name:'DB Incline Chest Press',       sets:4, target:'6–10 reps', notes:'Main compound — priority lift'},
      {id:'cable_fly',     name:'Cable Fly / Pec Deck',         sets:3, target:'10–12 reps',notes:'Full stretch, squeeze at top'},
      {id:'tri_pushdown',  name:'Triceps Pushdown',             sets:3, target:'10–12 reps',notes:'Single hand cable, elbows fixed'},
      {id:'tri_overhead',  name:'Overhead Triceps Ext',         sets:3, target:'9–11 reps', notes:'Long head stretch, slow eccentric'},
      {id:'shrug_d1',      name:'Barbell / DB Shrug',           sets:3, target:'10–12 reps',notes:'Heavy, 3-sec hold at top', isTraps:true},
    ]},
  { id:'pull', label:'DAY 2', name:'PULL', sub:'Back · Biceps · Traps', color:'#3a7aa0',
    exercises:[
      {id:'lat_pull',  name:'Pull-Ups / Lat Pulldown',          sets:4, target:'9 reps',    notes:'Full stretch at top'},
      {id:'cable_row', name:'Seated Cable Row',                 sets:3, target:'8–10 reps', notes:'Drive elbows back, full contraction'},
      {id:'shrug_d2',  name:'Shrug + Upright Row',              sets:3, target:'10+10',     notes:'Superset — no rest between', isTraps:true},
      {id:'ez_curl',   name:'EZ-Bar / DB Curl',                 sets:3, target:'7–10 reps', notes:'Supinate at top, strict form'},
    ]},
  { id:'shoulders', label:'DAY 3', name:'SHOULDERS + ARMS', sub:'All 3 Delt Heads · Tri · Bi', color:'#c87a3c',
    exercises:[
      {id:'sh_press',  name:'Shoulder Press (Machine/DB)',      sets:4, target:'8 reps',    notes:'Primary compound — heaviest lift'},
      {id:'lat_raise', name:'DB Lateral Raise',                 sets:3, target:'10–12 reps',notes:'Lateral head — strict form'},
      {id:'rear_fly',  name:'Rear Delt Fly / Face Pull',        sets:3, target:'10–12 reps',notes:'Rear head — focus on contraction'},
      {id:'skull',     name:'Skull Crushers / Cable Ext',       sets:3, target:'10 reps',   notes:'Full stretch at bottom'},
      {id:'inc_curl',  name:'EZ-Bar / Incline DB Curl',         sets:3, target:'8–10 reps', notes:'Upper arms pinned, long head'},
    ]},
  { id:'legs', label:'DAY 4', name:'LEGS + ABS', sub:'Quads · Hamstrings · Calves · Core', color:'#b88a3c',
    exercises:[
      {id:'leg_ss',    name:'Leg Curl + Calf Raise',            sets:3, target:'10+10',     notes:'Superset — no rest between'},
      {id:'leg_ext',   name:'Leg Extension',                    sets:3, target:'12–15 reps',notes:'High rep burnout last set'},
      {id:'leg_press', name:'Leg Press / Squat',                sets:3, target:'8–12 reps', notes:'Optional — skip if short on time'},
      {id:'ab_crunch', name:'Cable Crunch',                     sets:3, target:'12–15 reps',notes:'Hips still, crunch with abs', isAbs:true},
      {id:'ab_raise',  name:'Hanging Leg Raise',                sets:3, target:'10–12 reps',notes:'Control the descent', isAbs:true},
      {id:'ab_plank',  name:'Plank / Ab Wheel',                 sets:3, target:'30–45s',    notes:'Wks 1–4 plank → Wks 5+ rollout', isAbs:true},
    ]},
];

// ── Year structure ───────────────────────────────────────────
const YEAR_START = new Date(2026, 0, 1); // Jan 1 2026 (Thursday)
function weekToDate(w) {
  const d = new Date(YEAR_START);
  d.setDate(d.getDate() + (w - 1) * 7);
  return d;
}
function fmtDate(d) {
  return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
}
function weekRange(w) {
  const start = weekToDate(w);
  const end = new Date(start);

let DATA = {};
try {
  const stored = localStorage.getItem(KEY);
  if (stored) {
    DATA = JSON.parse(stored);
  } else {
    // First load: seed with historical data
    DATA = JSON.parse(JSON.stringify(HISTORICAL_DATA));
    localStorage.setItem(KEY, JSON.stringify(DATA));
  }
} catch {
  DATA = JSON.parse(JSON.stringify(HISTORICAL_DATA));
}

function save() { try { localStorage.setItem(KEY, JSON.stringify(DATA)); } catch {} }
function getVal(w, exId, si) { return (DATA[w] && DATA[w][exId] && DATA[w][exId][si]) || ''; }
function setVal(w, exId, si, val) {
  if (!DATA[w]) DATA[w] = {};
  if (!DATA[w][exId]) DATA[w][exId] = {};
  if (val) {
    DATA[w][exId][si] = val;
  } else {
    delete DATA[w][exId][si];
    if (Object.keys(DATA[w][exId]).length === 0) delete DATA[w][exId];
    if (Object.keys(DATA[w]).length === 0) delete DATA[w];
  }
  save();
}
function getAllPriorVals(week, exId) {
  const all = [];
  for (let w = 1; w < week; w++) {
    if (DATA[w] && DATA[w][exId]) Object.values(DATA[w][exId]).forEach(v => all.push(v));
  }
  return all;
}
function weekHasData(w) {
  if (!DATA[w]) return false;
  for (const ex of Object.values(DATA[w])) for (const v of Object.values(ex)) if (v) return true;
  return false;
}
// Get last logged week's value for this exercise & set (for placeholder hint)
function getLastLoggedSet(currentWeek, exId, si) {
  for (let w = currentWeek - 1; w >= 1; w--) {
    const v = getVal(w, exId, si);
    if (v) return v;
  }
  return null;
}

// ── State ─────────────────────────────────────────────────────
function currentDateWeek() {
  const now = new Date();
  if (now < YEAR_START) return 1;
  const diff = Math.floor((now - YEAR_START) / (1000*60*60*24*7)) + 1;
  return Math.min(52, Math.max(1, diff));
}
let currentView = 'log';
let currentQuarter = weekToQuarter(currentDateWeek());
let currentWeek = currentDateWeek();
let currentDay = 0;
let trackerScope = 'quarter'; // 'quarter' or 'year'

// ── CSV Export ────────────────────────────────────────────────
function exportCSV() {
  let csv = 'Year,Week,Date,Day,Exercise,Set,Entry,Weight(kg),Reps\n';
  for (let w = 1; w <= 52; w++) {
    const date = fmtDate(weekToDate(w));
    PROGRAM.forEach(day => day.exercises.forEach(ex => {
      for (let s = 0; s < ex.sets; s++) {
        const v = getVal(w, ex.id, s);
        const p = parseEntry(v);
        csv += `"2026","${w}","${date}","${day.name}","${ex.name}","${s+1}","${v}","${p?p.weight:''}","${p?p.reps:''}"\n`;
      }
    }));
  }
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ironlog_2026_' + new Date().toISOString().slice(0,10) + '.csv'; a.click();
  URL.revokeObjectURL(url);
}

let toastTimer = null;
function showToast(type, delta) {
  const t = document.getElementById('toast');
  const icon = type === 'WT' ? '🏆' : '💪';
  const label = type === 'WT' ? 'WEIGHT PR' : 'REP PR';
  t.innerHTML = `<span class="toast-icon">${icon}</span> ${label} ${delta}`;
  t.className = 'toast' + (type === 'REP' ? ' rep' : '');
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

function escHtml(s) {
  if (!s) return '';
  return s.toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function renderQuarterBar(app) {
  let html = '<div class="quarter-bar"><div class="quarter-grid">';
  [1,2,3,4].forEach(q => {
    const info = QUARTER_INFO[q];
    const active = q === currentQuarter ? 'active' : '';
    html += `<button class="qbtn q${q} ${active}" onclick="selectQuarter(${q})">
      ${info.label}
      <span class="q-dates">${info.dates}</span>
    </button>`;
  });
  html += '</div></div>';
  app.innerHTML += html;
}

function renderLog(app) {
  renderQuarterBar(app);

  const [qStart, qEnd] = quarterWeeks(currentQuarter);
  const todayWk = currentDateWeek();
  const inThisQuarter = currentWeek >= qStart && currentWeek <= qEnd;
  if (!inThisQuarter) currentWeek = qStart;

  const day = PROGRAM[currentDay];

  // Week selector
  let weekBtns = '';
  for (let w = qStart; w <= qEnd; w++) {
    const q = weekToQuarter(w);
    const active = w === currentWeek ? `active q${q}` : `q${q}`;
    const hasData = weekHasData(w) ? 'has-data' : '';
    const isFuture = w > todayWk;
    const archived = isFuture ? 'archived' : '';
    weekBtns += `<button class="week-btn ${active} ${hasData} ${archived}" onclick="selectWeek(${w})" title="${weekRange(w)}">${w}</button>`;
  }
  app.innerHTML += `
    <div class="week-bar">
      <div class="section-label">
        <span>Select Week · ${QUARTER_INFO[currentQuarter].label}</span>
        <span class="week-info">${weekRange(currentWeek)}</span>
      </div>
      <div class="week-grid">${weekBtns}</div>
    </div>`;

  // Day tabs
  let dayTabs = '';
  PROGRAM.forEach((d, i) => {
    const active = i === currentDay;
    const style = active ? `background:${d.color};border-color:${d.color}` : '';
    dayTabs += `
      <button class="day-tab ${active?'active':''}" style="${style}" onclick="selectDay(${i})">
        <span class="day-num">${d.label.split(' ')[1]}</span>${d.name}
      </button>`;
  });
  app.innerHTML += `<div class="day-tabs">${dayTabs}</div>`;

  // Phase / week info banner
  const isCurrent = currentWeek === todayWk;
  const isPast = currentWeek < todayWk;
  const isFuture = currentWeek > todayWk;
  const status = isCurrent ? 'CURRENT WEEK' : isPast ? 'PAST WEEK' : 'UPCOMING';
  const statusColor = isCurrent ? '#5fb37a' : isPast ? '#a8a497' : '#6a6660';
  app.innerHTML += `
    <div class="phase-banner">
      <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:${statusColor};border-radius:0 4px 4px 0"></div>

        <div class="phase-tag" style="color:${statusColor}">${status}</div>
        <div class="phase-week">WEEK ${String(currentWeek).padStart(2,'0')} / 52 · ${weekRange(currentWeek)}</div>
      </div>
      <div class="phase-tip">${isCurrent ? 'Beat last week\'s numbers' : isPast ? 'Edit / review your sessions' : 'Tap a set to plan ahead'}</div>
    </div>`;

  // Prev week ref
  if (currentWeek > 1) {
    const pw = currentWeek - 1;
    let refRows = '';
    let hasAny = false;
    day.exercises.forEach(ex => {
      const vals = Array.from({length: ex.sets}, (_,s) => getVal(pw, ex.id, s)).filter(Boolean);
      const shortName = ex.name.split('/')[0].trim();
      if (!vals.length) {
        refRows += `<div class="prev-row"><span class="prev-name">${shortName}</span><span class="prev-best" style="color:var(--text-4)">—</span></div>`;
        return;
      }
      hasAny = true;
      const best = bestOfEntries(vals);
      const bestStr = best ? `${best.weight}kg × ${best.reps}` : vals[0];
      refRows += `<div class="prev-row"><span class="prev-name">${shortName}</span><span class="prev-best">${bestStr}</span></div>`;
    });
    app.innerHTML += `<div class="prev-ref">
      <div class="prev-title">
        <span>Week ${pw} · Best Sets</span>
        <span style="color:var(--text-4);font-size:10px">target to beat</span>

        <div class="ex-name">${ex.name}</div>
        <div class="ex-meta">
          <span class="ex-target" style="background:${tagBg};color:${tagColor}">${ex.sets}× ${ex.target}</span>
          ${sideTagBadge}
          <span class="ex-notes">${ex.notes}</span>
        </div>
      </div>
      ${setsHTML}
    </div>`;
  });
  cards += '</div>';
  app.innerHTML += cards;
  app.innerHTML += `<div class="log-tip"><strong>🔥</strong> last set to failure  ·  <strong style="color:var(--gold-strong)">★</strong> weight PR  ·  <strong style="color:var(--green-strong)">★</strong> rep PR<br>Empty cells show last week as a placeholder hint — type to log</div>`;
}

function renderTracker(app) {
  // Quarter bar at top — but allow full-year view
  app.innerHTML += `<div class="tracker-header">
    <div class="tracker-title">PROGRESS</div>
    <div class="tracker-sub">Best set per week · Scans all sets · Scroll →</div>
    <div class="tracker-controls">
      <button class="tracker-filter ${trackerScope==='quarter'?'active':''}" onclick="setTrackerScope('quarter')">${QUARTER_INFO[currentQuarter].label} ONLY</button>
      <button class="tracker-filter ${trackerScope==='year'?'active':''}" onclick="setTrackerScope('year')">FULL YEAR</button>
    </div>
  </div>`;

  if (trackerScope === 'quarter') renderQuarterBar(app);

  const [qStart, qEnd] = trackerScope === 'quarter' ? quarterWeeks(currentQuarter) : [1, 52];
  const weekRangeArr = [];
  for (let w = qStart; w <= qEnd; w++) weekRangeArr.push(w);

  // Calculate summary stats for the chosen scope
  let totalPRs = 0, progressed = 0, tracked = 0;
  PROGRAM.forEach(d => d.exercises.forEach(ex => {
    const wkBests = weekRangeArr.map(w => {
      const vals = Array.from({length:ex.sets}, (_,s) => getVal(w, ex.id, s));
      return bestOfEntries(vals);
    });
    const filled = wkBests.filter(Boolean);
    if (!filled.length) return;
    tracked++;
    const first = filled[0], last = filled[filled.length-1];
    if (last.weight > first.weight || last.reps > first.reps) progressed++;
    wkBests.forEach((wd, wi) => {
      if (!wd) return;
      const prior = wkBests.slice(0, wi).filter(Boolean).map(p => `${p.weight}kg x${p.reps}`);
      if (checkPR(wd, prior)) totalPRs++;
    });
  }));

  app.innerHTML += `
    <div class="summary-bar">
      <div class="summary-card tracked"><div class="summary-num" style="color:var(--text)">${tracked}</div><div class="summary-lbl">Tracked</div></div>
      <div class="summary-card improved"><div class="summary-num" style="color:var(--green-strong)">${progressed}</div><div class="summary-lbl">Improved</div></div>
      <div class="summary-card prs"><div class="summary-num" style="color:var(--gold-strong)">${totalPRs}</div><div class="summary-lbl">PRs Hit</div></div>
    </div>
    <div class="tracker-cards">`;

  PROGRAM.forEach(d => {
    app.innerHTML += `<div class="day-section-label" style="color:${d.color}">${d.label} — ${d.name}</div>`;
    d.exercises.forEach(ex => {
      const wkBests = weekRangeArr.map(w => {
        const vals = Array.from({length:ex.sets}, (_,s) => getVal(w, ex.id, s));
        return bestOfEntries(vals);
      });
      const allVals = [];
      weekRangeArr.forEach(w => { for (let s=0;s<ex.sets;s++) allVals.push(getVal(w, ex.id, s)); });
      const overallBest = bestOfEntries(allVals);

      const badges = overallBest
        ? `<div class="t-badges"><span class="t-badge wt">${overallBest.weight}kg</span><span class="t-badge rep">${overallBest.reps} rp</span></div>`
        : '';

      let weeksHTML = '<div class="t-weeks">';
      wkBests.forEach((wd, wi) => {
        const w = weekRangeArr[wi];
        const prior = wkBests.slice(0, wi).filter(Boolean).map(p => `${p.weight}kg x${p.reps}`);
        const pr = wd ? checkPR(wd, prior) : null;
        if (!wd) {
          weeksHTML += `<div class="t-week empty"><div class="t-wk-lbl">W${w}</div><div class="t-wk-empty">—</div></div>`;
        } else {
          const prCls = pr ? (pr.type==='WT' ? 'pr-wt' : 'pr-rep') : '';
          const wtColor = pr?.type==='WT' ? 'var(--gold-strong)' : pr?.type==='REP' ? 'var(--green-strong)' : 'var(--text)';
          const rpColor = pr ? (pr.type==='WT' ? '#c8a000' : 'var(--green)') : 'var(--text-3)';
          const star = pr ? `<div class="t-wk-star" style="color:${pr.type==='WT'?'var(--gold-strong)':'var(--green-strong)'}">★ ${pr.delta}</div>` : '';
          weeksHTML += `<div class="t-week ${prCls}">
            <div class="t-wk-lbl">W${w}</div>
            <div class="t-wk-wt" style="color:${wtColor}">${wd.weight}</div>
            <div class="t-wk-rp" style="color:${rpColor}">×${wd.reps}</div>
            ${star}
          </div>`;
        }
      });
      weeksHTML += '</div>';

      const noData = !overallBest ? '<div class="t-no-data">No data in this scope</div>' : '';
      app.innerHTML += `<div class="t-card" style="border-top-color:${d.color}">
        <div class="t-card-hdr">
          <div class="t-ex-name">${ex.name}</div>
          ${badges}
        </div>
        ${overallBest ? weeksHTML : noData}
      </div>`;
    });
  });
  app.innerHTML += '</div>';
}

function renderYear(app) {
  app.innerHTML += `<div class="tracker-header">
    <div class="tracker-title">YEAR REVIEW</div>
    <div class="tracker-sub">2026 · Quarter-by-quarter overview</div>
  </div>`;

  // Compute stats per quarter
  let yearHtml = '<div style="padding:16px 18px 20px;">';
  for (let q = 1; q <= 4; q++) {
    const info = QUARTER_INFO[q];
    const [qs, qe] = quarterWeeks(q);
    let weeksLogged = 0, totalPRs = 0, exercisesProgressed = 0, exercisesTracked = 0;
    for (let w = qs; w <= qe; w++) if (weekHasData(w)) weeksLogged++;

    PROGRAM.forEach(d => d.exercises.forEach(ex => {
      const wkBests = [];
      for (let w = qs; w <= qe; w++) {
        const vals = Array.from({length:ex.sets}, (_,s) => getVal(w, ex.id, s));
        wkBests.push(bestOfEntries(vals));
      }
      const filled = wkBests.filter(Boolean);
      if (!filled.length) return;
      exercisesTracked++;
      const first = filled[0], last = filled[filled.length-1];
      if (last.weight > first.weight || last.reps > first.reps) exercisesProgressed++;
      wkBests.forEach((wd, wi) => {
        if (!wd) return;
        const prior = wkBests.slice(0, wi).filter(Boolean).map(p => `${p.weight}kg x${p.reps}`);
        if (checkPR(wd, prior)) totalPRs++;
      });
    }));

    const totalWeeks = qe - qs + 1;
    const completionPct = Math.round((weeksLogged / totalWeeks) * 100);

    yearHtml += `
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;margin-bottom:14px;overflow:hidden;border-top:3px solid ${info.color}">
        <div style="padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:24px;letter-spacing:3px;color:${info.color}">${info.label}</div>
            <div style="font-size:11px;color:var(--text-3);margin-top:4px;font-family:'Courier New',monospace">${info.dates} · Wks ${qs}–${qe}</div>
          </div>
          <button onclick="jumpToQuarter(${q})" style="background:var(--bg-elevated);border:1px solid var(--border-strong);color:var(--text-2);padding:8px 14px;border-radius:8px;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;font-family:inherit">VIEW →</button>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;background:var(--border);gap:1px">
          <div style="background:var(--bg-card);padding:14px 8px;text-align:center">
            <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:24px;color:var(--text)">${weeksLogged}<span style="font-size:13px;color:var(--text-3)">/${totalWeeks}</span></div>
            <div style="font-size:9px;color:var(--text-3);letter-spacing:2px;margin-top:4px;font-weight:700">WEEKS</div>
          </div>
          <div style="background:var(--bg-card);padding:14px 8px;text-align:center">
            <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:24px;color:${info.color}">${completionPct}%</div>
            <div style="font-size:9px;color:var(--text-3);letter-spacing:2px;margin-top:4px;font-weight:700">DONE</div>
          </div>
          <div style="background:var(--bg-card);padding:14px 8px;text-align:center">
            <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:24px;color:var(--green-strong)">${exercisesProgressed}</div>
            <div style="font-size:9px;color:var(--text-3);letter-spacing:2px;margin-top:4px;font-weight:700">IMPROVED</div>
          </div>
          <div style="background:var(--bg-card);padding:14px 8px;text-align:center">
            <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:24px;color:var(--gold-strong)">${totalPRs}</div>
            <div style="font-size:9px;color:var(--text-3);letter-spacing:2px;margin-top:4px;font-weight:700">PRs</div>
          </div>
        </div>
      </div>`;
  }

  // Year totals
  let yrPRs = 0, yrProgressed = 0, yrTracked = 0;
  PROGRAM.forEach(d => d.exercises.forEach(ex => {
    const wkBests = [];
    for (let w = 1; w <= 52; w++) {
      const vals = Array.from({length:ex.sets}, (_,s) => getVal(w, ex.id, s));
      wkBests.push(bestOfEntries(vals));
    }
    const filled = wkBests.filter(Boolean);
    if (!filled.length) return;
    yrTracked++;
    const first = filled[0], last = filled[filled.length-1];
    if (last.weight > first.weight || last.reps > first.reps) yrProgressed++;
    wkBests.forEach((wd, wi) => {
      if (!wd) return;
      const prior = wkBests.slice(0, wi).filter(Boolean).map(p => `${p.weight}kg x${p.reps}`);
      if (checkPR(wd, prior)) yrPRs++;
    });
  }));
  let totalLogged = 0;
  for (let w = 1; w <= 52; w++) if (weekHasData(w)) totalLogged++;

  yearHtml += `
    <div style="background:linear-gradient(135deg,#1a2a14 0%,#14140f 100%);border:1px solid var(--green-border);border-radius:16px;padding:18px;margin-top:8px">
      <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:20px;letter-spacing:3px;color:var(--green-strong);margin-bottom:14px;text-align:center">2026 TOTAL</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;text-align:center">
        <div>
          <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:30px;color:var(--text)">${totalLogged}</div>
          <div style="font-size:9px;color:var(--text-3);letter-spacing:2px;margin-top:4px;font-weight:700">WEEKS</div>
        </div>
        <div>
          <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:30px;color:var(--text)">${yrTracked}</div>
          <div style="font-size:9px;color:var(--text-3);letter-spacing:2px;margin-top:4px;font-weight:700">LIFTS</div>
        </div>
        <div>
          <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:30px;color:var(--green-strong)">${yrProgressed}</div>
          <div style="font-size:9px;color:var(--text-3);letter-spacing:2px;margin-top:4px;font-weight:700">IMPROVED</div>
        </div>
        <div>
          <div style="font-family:'Impact','Arial Narrow',sans-serif;font-size:30px;color:var(--gold-strong)">${yrPRs}</div>
          <div style="font-size:9px;color:var(--text-3);letter-spacing:2px;margin-top:4px;font-weight:700">PRs</div>
        </div>
      </div>
    </div>`;

  yearHtml += '</div>';
  app.innerHTML += yearHtml;
}

function handleInput(exId, si, val) {
  const trimmed = val.trim();
  setVal(currentWeek, exId, si, trimmed);
  const parsed = parseEntry(trimmed);
  if (parsed) {
    const prior = getAllPriorVals(currentWeek, exId);
    const pr = checkPR(parsed, prior);
    if (pr) showToast(pr.type, pr.delta);
  }
  render();
}

function switchView(v) { currentView = v; render(); window.scrollTo({top:0, behavior:'smooth'}); }
function selectQuarter(q) { currentQuarter = q; const [qs] = quarterWeeks(q); currentWeek = Math.max(qs, Math.min(qs + 12, currentWeek)); render(); }
function selectWeek(w) { currentWeek = w; currentQuarter = weekToQuarter(w); render(); }
function selectDay(i) { currentDay = i; render(); }
function setTrackerScope(s) { trackerScope = s; render(); }
function jumpToQuarter(q) { currentView = 'log'; selectQuarter(q); }

render();
</script>
</body>
</html>
